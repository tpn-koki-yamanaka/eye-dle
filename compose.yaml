services:
  workspace:
    build:
      context: .
      dockerfile: ./.devcontainer/Dockerfile
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - mise_data:/root/.local/share/mise
      - mise_bin:/root/.local/bin
    tty: true
volumes:
  mise_data:
  mise_bin:
